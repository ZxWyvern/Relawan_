<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>RelawanBisa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
  <body>
    <nav>
        <ul class="nav-container">
            <li><a href="./index.html">Home</a></li>
<li><a href="#daftarPengumuman">List Acara</a></li>
<li><a href="./tentang-kami.html">Tentang Kami</a></li>
<li><a href="./hubungi.html">Hubungi Kami</a></li>
        </ul>
    </nav>
  <h1>RelawanBisa</h1>
  <p id="info-head">Platform untuk menghubungkan relawan dengan kegiatan sosial.</p>
  <h2>Tambah Acara Baru</h2>

  <div id="formTambah">
    <input type="text" id="inputJudul" placeholder="Judul acara"><br><br>
    <input type="text" id=inputDeskripsi placeholder="Deskripsi acara"><br><br>
    <input type="date" id="inputTanggal"><br><br>
    <button class="tambahAcara" onclick="tambahAcara()">Tambah Acara</button>
  </div>

  <h2>Daftar Pengumuman</h2>

  <div id="daftarPengumuman">

    <template id="templateKartu">
      <article class="kotak kartu-acara">
        <div class="kartu-banner">
          <img src="img/" alt="Banner" class="kartu-banner-img" width="1200" height="400">
        </div>
        <header class="kartu-header">
          <div class="kartu-header-text">
            <span class="kartu-badge jumlah-daftar"></span>
            <h3 class="kartu-judul"></h3>
          </div>
          <div class="kartu-actions">
            <label class="label-input-tanggal-edit">
              <span class="label-input-tanggal-edit-teks">Edit Tanggal</span>
              <input type="date" class="input-tanggal-edit">
            </label>
            <button type="button" class="btn-edit" title="Ubah data acara">Edit</button>
            <button type="button" class="btn-hapus" title="Hapus acara ini">
              <span class="btn-hapus-label">Hapus</span>
            </button>
          </div>
        </header>
        <div class="kartu-body">
          <p class="kartu-id"></p>
          <p class="kartu-deskripsi"></p>
          <p class="kartu-tanggal"></p>
        </div>
        <footer class="kartu-footer">
          <button type="button" class="btn-daftar">Daftar dan jadi relawan</button>
        </footer>
      </article>
    </template>

  </div>
  <script src="js/crud.js"></script>
</body>
</html>

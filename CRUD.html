<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>RelawanBisa</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <h1>RelawanBisa</h1>
  <p id="info-head">Platform untuk menghubungkan relawan dengan kegiatan sosial.</p>
  <h2>Tambah Acara Baru</h2>


  <div id="formTambah">
    <input type="text" id="inputJudul" placeholder="Judul acara"><br><br>
    <input type="text" id="inputDeskripsi" placeholder="Deskripsi acara"><br><br>
    <input type="date" id="inputTanggal"><br><br>
    <button onclick="tambahAcara()">Tambah Acara</button>
  </div>


  <h2>Daftar Pengumuman</h2>

  
  <div id="daftarPengumuman">
    <template id="templateKartu">
      <div class="kotak">
        <div class="jumlah-daftar"></div>
        <h3 class="kartu-judul"></h3>
        <p class="kartu-id"></p>
        <p class="kartu-deskripsi"></p>
        <p class="kartu-tanggal"></p>
        <button class="btn-daftar">Daftar & Jadi Relawan</button>
        <button class="btn-hapus">Hapus Acara</button>
      </div>
    </template>
  </div>

  <script src="js/crud.js"></script>
</body>
</html>
